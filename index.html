<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全能在线工具箱 - 免费实用工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f7f8fa;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    header {
      text-align: center;
      margin: 30px 0;
    }
    h1 {
      font-size: 26px;
      color: #222;
      margin-bottom: 8px;
    }
    .desc {
      color: #666;
      font-size: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 22px 16px;
      text-align: center;
      box-shadow: 0 3px 10px rgba(0,0,0,0.05);
      transition: 0.2s;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-3px);
    }
    .card h3 {
      font-size: 16px;
      margin-bottom: 6px;
      color: #333;
    }
    .card p {
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h1>🔧 全能在线工具箱</h1>
      <p class="desc">免费 · 无需登录 · 无需下载 · 全功能在线使用</p>
    </header>

    <div class="grid">
      <div class="card">
        <h3>PDF 合并拆分</h3>
        <p>PDF处理、转Word、合并、拆分</p>
      </div>
      <div class="card">
        <h3>OCR 图片转文字</h3>
        <p>图片一键识别可复制文字</p>
      </div>
      <div class="card">
        <h3>文本去重排版</h3>
        <p>清理空行、去重、智能排版</p>
      </div>
      <div class="card">
        <h3>课表转换生成</h3>
        <p>大学生课表一键生成</p>
      </div>
      <div class="card">
        <h3>图片压缩转换</h3>
        <p>JPG/PNG/WebP互转</p>
      </div>
      <div class="card">
        <h3>文字转图片</h3>
        <p>文字生成精美图片</p>
      </div>
      <div class="card">
        <h3>文案提取去重</h3>
        <p>提取文案、去重、清洗</p>
      </div>
      <div class="card">
        <h3>壁纸生成器</h3>
        <p>自定义制作高清壁纸</p>
      </div>
      <div class="card">
        <h3>表情包制作</h3>
        <p>自制表情包、加字、改图</p>
      </div>
      <div class="card">

      </div>
      <div class="card">
        <h3>简历模板生成</h3>
        <p>大学生简历一键生成</p>
      </div>
    </div>
  </div>
</body>
</html>
